<!DOCTYPE html>
<html>
<head>
<title>عيد سعيد 🌙</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* 🌙 Bulan */
.moon {
  position:fixed;
  top:60px;
  right:60px;
  width:60px;
  height:60px;
  background: radial-gradient(circle,#fff 60%,#ddd);
  border-radius:50%;
  box-shadow:0 0 30px rgba(255,255,255,0.7);
}

/* ⭐ Bintang */
.star {
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {opacity:0.2;}
  to {opacity:1;}
}

/* Container */
.container {
  text-align:center;
}

/* 🕌 Masjid SVG */
.masjid svg {
  width:120px;
  margin-bottom:15px;
  fill:white;
}

/* Input */
input {
  padding:12px;
  border:none;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c9a7;
  color:white;
  cursor:pointer;
}

/* Card */
.card {
  display:none;
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  width:300px;
}
.card.show { display:block; }

h2,p { direction:rtl; }

.from {
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

/* 🎉 Confetti */
.confetti {
  position:absolute;
  width:8px;
  height:8px;
  animation:fall 3s linear forwards;
}
@keyframes fall {
  0%{ transform: translateY(0); opacity:1;}
  100%{ transform: translateY(800px); opacity:0;}
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="container">
  <div id="start">

    <!-- 🕌 MASJID FIX -->
    <div class="masjid">
      <svg viewBox="0 0 64 64">
        <path d="M32 6l6 6v6h-4v-4h-4v4h-4v-6l6-6zm-14 14h28v30h-6v-16h-16v16h-6v-30zm-4 30h36v4h-36v-4z"/>
      </svg>
    </div>

    <input id="nama" placeholder="Nama kamu...">
    <br>
    <button onclick="go()">Lihat Ucapan 💌</button>
  </div>

  <div class="card" id="card">
    <h2>🌙 عيد سعيد !</h2>
    <p id="isi"></p>
    <div class="from">— Fairuz</div>
  </div>
</div>

<script>
/* ⭐ BINTANG BANYAK */
function createStars(){
  for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*window.innerHeight+"px";
    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.animationDuration=(1+Math.random()*2)+"s";
    document.body.appendChild(s);
  }
}
createStars();

/* 🎉 CONFETTI */
function confetti(){
  for(let i=0;i<25;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.background=`hsl(${Math.random()*360},80%,60%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

/* MAIN */
function go(){
  let n=document.getElementById("nama").value;
  if(n==""){ alert("Isi nama dulu 😤"); return; }

  document.getElementById("start").style.display="none";
  document.getElementById("card").classList.add("show");

  document.getElementById("isi").innerHTML=
  "Teruntuk "+n+"<br><br>"+
  "بـمنـاسـبـة حلــول عيـــد الفطر المبـــارك ✨<br><br>"+
  "أتمنى لك طاعة مقبولة وأعمال صالحة متقبلة.<br>"+
  "لتكن أيامك مليئة بالسعادة والتفاؤل والسلام 🌹<br><br>"+
  "عيد فطر مبارك وكل عام وأنتم إلى اللــه أقرب";

  confetti();
}
</script>

</body>
</html>
