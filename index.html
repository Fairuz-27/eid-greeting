<!DOCTYPE html>
<html>
<head>
<h2>🌙 عيد سعيد! 🌙</h2>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

/* overlay */
.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  top:0;
  left:0;
}

/* bulan */
.moon {
  position:absolute;
  top:60px;
  right:60px;
  width:80px;
  height:80px;
  background: radial-gradient(circle,#fff 60%,#ddd);
  border-radius:50%;
  box-shadow:0 0 40px rgba(255,255,255,0.8);
}

/* bintang */
.stars::after {
  content:"";
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  box-shadow:
    50px 100px white,
    150px 200px white,
    300px 50px white,
    400px 300px white,
    600px 150px white,
    800px 250px white,
    200px 400px white,
    700px 100px white;
  animation:blink 2s infinite alternate;
}

@keyframes blink {
  from {opacity:0.3;}
  to {opacity:1;}
}

.container {
  position:relative;
  z-index:2;
  text-align:center;
}

input {
  padding:10px;
  border:none;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c9a7;
  color:white;
  cursor:pointer;
}

/* card */
.card {
  display:none;
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  width:320px;
  backdrop-filter: blur(10px);
  animation:fade 1s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

h2,p {
  direction:rtl;
}

.from {
  font-size:13px;
  margin-top:10px;
  direction:ltr;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="overlay"></div>
<div class="moon"></div>
<div class="stars"></div>

<div class="container">

<div id="start">
  <h3>Masukkan nama kamu dulu 👇</h3>
  <input id="nama" placeholder="Nama kamu...">
  <br>
  <button onclick="go()">Lihat Ucapan 💌</button>
</div>

<div class="card" id="card">
  <h2>🌙 كل عام وأنتم بخير وسعادة 🌙</h2>

  <p id="isi"></p>

  <div class="from">— From Fairuz 💫</div>
</div>

</div>

<!-- backsound (takbiran vibes) -->
<audio id="bgm" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
</audio>

<script>
function go(){
let n=document.getElementById("nama").value;
if(n==""){alert("Isi nama dulu 😤");return;}

document.getElementById("start").style.display="none";
document.getElementById("card").style.display="block";

document.getElementById("isi").innerHTML =
"Teruntuk "+n+"<br><br>"+
"بـمنـاسـبـة حلــول عيـــد الفطر المبـــارك ✨<br><br>"+
"أتمنى لك طاعة مقبولة وأعمال صالحة متقبلة.<br>"+
"لتكن أيامك مليئة بالسعادة والتفاؤل والسلام 🌹<br><br>"+
"عيد فطر مبارك وكل عام وأنتم إلى اللــه أقرب";

// play musik setelah klik
document.getElementById("bgm").play();
}
</script>

</body>
</html>
