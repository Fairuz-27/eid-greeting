<!DOCTYPE html>
<html>
<head>
<title>عيد سعيد🌙</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:'Segoe UI', sans-serif;
  overflow:hidden;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

body {
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* Bintang tetap */
.stars {
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:0;
}

.stars::after {
  content:"";
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  box-shadow:
    50px 100px white,
    150px 200px white,
    300px 50px white,
    400px 300px white,
    600px 150px white,
    800px 250px white,
    200px 400px white,
    700px 100px white;
  animation:blink 2s infinite alternate;
}

@keyframes blink { from {opacity:0.3;} to {opacity:1;} }

/* Bulan melayang */
.moon {
  position:fixed;
  top:60px;
  right:60px;
  width:80px;
  height:80px;
  background: radial-gradient(circle,#fff 60%,#ddd);
  border-radius:50%;
  box-shadow:0 0 40px rgba(255,255,255,0.8);
  animation: moonFloat 6s ease-in-out infinite alternate;
  z-index:1;
}

@keyframes moonFloat {
  0%{ transform: translateY(0px);}
  100%{ transform: translateY(15px);}
}

/* Container card */
.container {
  position:relative;
  z-index:2;
  text-align:center;
}

input {
  padding:10px;
  border:none;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c9a7;
  color:white;
  cursor:pointer;
}

/* Card animasi */
.card {
  display:none;
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  width:320px;
  backdrop-filter: blur(10px);
  transform: translateY(30px) scale(0.8);
  opacity:0;
  transition: all 0.8s ease;
}

.card.show {
  display:block;
  transform: translateY(0) scale(1);
  opacity:1;
}

h2,p { direction:rtl; }
.from { font-size:13px; margin-top:10px; direction:ltr; opacity:0.8; }

/* Bintang jatuh */
.falling-star {
  position:absolute;
  width:3px; height:3px;
  background:white; border-radius:50%;
  animation:fall linear forwards;
}

@keyframes fall {
  0%{ transform: translateY(0) translateX(0); opacity:1; }
  100%{ transform: translateY(800px) translateX(-50px); opacity:0; }
}

/* Confetti */
.confetti {
  position:absolute;
  width:8px; height:8px;
  opacity:0.9;
  transform: rotate(0deg);
  animation: confetti-fall 3s linear forwards;
}

@keyframes confetti-fall {
  0%{ transform: translateY(0) rotate(0deg); opacity:1; }
  100%{ transform: translateY(800px) rotate(360deg); opacity:0; }
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="container">
  <div id="start">
    <input id="nama" placeholder="Nama kamu...">
    <br>
    <button onclick="go()">Lihat Ucapan 💌</button>
  </div>

  <div class="card" id="card">
    <h2>🌙 عيد سعيد🌙</h2>
    <p id="isi"></p>
    <div class="from">— From Fairuz 💫</div>
  </div>
</div>

<script>
function fallingStars(){
    for(let i=0;i<10;i++){
        let star=document.createElement('div');
        star.classList.add('falling-star');
        star.style.left=Math.random()*window.innerWidth+'px';
        star.style.animationDuration=(1.5 + Math.random()*1.5)+'s';
        document.body.appendChild(star);
        setTimeout(()=>star.remove(),3000);
    }
}

function confettiFall(){
    for(let i=0;i<15;i++){
        let conf=document.createElement('div');
        conf.classList.add('confetti');
        conf.style.left=Math.random()*window.innerWidth+'px';
        conf.style.background=`hsl(${Math.random()*360},80%,60%)`;
        conf.style.animationDuration=(2 + Math.random()*2)+'s';
        document.body.appendChild(conf);
        setTimeout(()=>conf.remove(),4000);
    }
}

function go(){
    let n=document.getElementById("nama").value;
    if(n==""){ alert("Isi nama dulu 😤"); return; }

    document.getElementById("start").style.display="none";
    let card=document.getElementById("card");
    card.classList.add("show");

    document.getElementById("isi").innerHTML=
    "Teruntuk "+n+"<br><br>"+
    "بـمنـاسـبـة حلــول عيـــد الفطر المبـــارك ✨<br><br>"+
    "أتمنى لك طاعة مقبولة وأعمال صالحة متقبلة.<br>"+
    "لتكن أيامك مليئة بالسعادة والتفاؤل والسلام 🌹<br><br>"+
    "عيد فطر مبارك وكل عام وأنتم إلى اللــه أقرب";

    fallingStars();
    confettiFall();
}
</script>

</body>
</html>
