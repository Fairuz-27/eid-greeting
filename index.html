<!DOCTYPE html>
<html>
<head>
<title>Eid Mubarak</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  text-align:center;
}

.card {
  display:none;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="box">

<div id="start">
<h3>Masukkan nama kamu</h3>
<input id="nama">
<br>
<button onclick="go()">Lihat</button>
</div>

<div class="card" id="card">
<h2>🌙 عيد فطر مبارك 🌙</h2>

<p id="isi"></p>

<p style="font-size:12px;">From Fairuz</p>
</div>

</div>

<script>
function go(){
let n = document.getElementById("nama").value;
if(n==""){alert("isi dulu");return;}

document.getElementById("start").style.display="none";
document.getElementById("card").style.display="block";

document.getElementById("isi").innerHTML =
"Teruntuk "+n+"<br><br>"+
"بـمنـاسـبـة حلــول عيـــد الفطر المبـــارك ✨<br><br>"+
"أتمنى لك طاعة مقبولة وأعمال صالحة متقبلة.<br>"+
"لتكن أيامك مليئة بالسعادة والتفاؤل والسلام 🌹<br><br>"+
"عيد فطر مبارك وكل عام وأنتم إلى اللــه أقرب";
}
</script>

</body>
</html>
