<!DOCTYPE html>
<html>
<head>
<title>عيد سعيد 🌙</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* ⭐ Bintang */
.stars::after {
  content:"";
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  box-shadow:
    50px 100px white,
    150px 200px white,
    300px 50px white,
    400px 300px white,
    600px 150px white,
    800px 250px white,
    200px 400px white,
    700px 100px white;
  animation:blink 2s infinite alternate;
}
@keyframes blink {
  from {opacity:0.3;}
  to {opacity:1;}
}

/* 🌙 Bulan */
.moon {
  position:fixed;
  top:60px;
  right:60px;
  width:80px;
  height:80px;
  background: radial-gradient(circle,#fff 60%,#ddd);
  border-radius:50%;
  box-shadow:0 0 40px rgba(255,255,255,0.8);
}

/* Container */
.container {
  text-align:center;
}

/* Input */
input {
  padding:12px;
  border:none;
  border-radius:10px;
}

button {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c9a7;
  color:white;
  cursor:pointer;
}

/* Card */
.card {
  display:none;
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:20px;
  width:300px;
}

.card.show {
  display:block;
}

h2,p { direction:rtl; }

.from {
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

/* 🎉 Confetti */
.confetti {
  position:absolute;
  width:8px;
  height:8px;
  animation:fall 3s linear forwards;
}
@keyframes fall {
  0%{ transform: translateY(0); opacity:1;}
  100%{ transform: translateY(800px); opacity:0;}
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="container">
  <div id="start">

    <!-- 🕌 MASJID BENER -->
    <img src="https://cdn-icons-png.flaticon.com/512/3448/3448339.png"
         style="width:120px; margin-bottom:15px;">

    <input id="nama" placeholder="Nama kamu...">
    <br>
    <button onclick="go()">Lihat Ucapan 💌</button>
  </div>

  <div class="card" id="card">
    <h2>🌙 عيد سعيد !</h2>
    <p id="isi"></p>
    <div class="from">— Fairuz</div>
  </div>
</div>

<script>
function confetti(){
  for(let i=0;i<20;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.background=`hsl(${Math.random()*360},80%,60%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

function go(){
  let n=document.getElementById("nama").value;
  if(n==""){ alert("Isi nama dulu 😤"); return; }

  document.getElementById("start").style.display="none";
  document.getElementById("card").classList.add("show");

  document.getElementById("isi").innerHTML=
  "Teruntuk "+n+"<br><br>"+
  "بـمنـاسـبـة حلــول عيـــد الفطر المبـــارك ✨<br><br>"+
  "أتمنى لك طاعة مقبولة وأعمال صالحة متقبلة.<br>"+
  "لتكن أيامك مليئة بالسعادة والتفاؤل والسلام 🌹<br><br>"+
  "عيد فطر مبارك وكل عام وأنتم إلى اللــه أقرب";

  confetti();
}
</script>

</body>
</html>
